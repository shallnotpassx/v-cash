services:
  mysql:
    image: mysql:8.0
    container_name: vcash-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vcash}
      MYSQL_USER: ${MYSQL_USER:-vcash}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-vcash123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - vcash-mysql-data:/var/lib/mysql
      - ../sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: deployment/backend.Dockerfile
    container_name: vcash-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8089
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-vcash}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-vcash}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-vcash123}
    ports:
      - "${BACKEND_PORT:-8089}:8089"

  frontend:
    build:
      context: ..
      dockerfile: deployment/frontend.Dockerfile
    container_name: vcash-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  vcash-mysql-data:
